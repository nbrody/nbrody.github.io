<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kernel Braid — t=2 Relation in B₄</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a0f;
            color: #e0e0e0;
            font-family: 'Inter', -apple-system, sans-serif;
            overflow: hidden;
        }

        #canvas-container {
            position: fixed;
            inset: 0;
            width: 100vw;
            height: 100vh;
        }

        /* Overlay HUD */
        .hud {
            position: fixed;
            bottom: 1.5rem;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(10, 10, 20, 0.75);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 14px;
            padding: 0.8rem 1.6rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.4rem;
            z-index: 10;
            max-width: 90vw;
        }

        .hud-title {
            font-size: 0.72rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: rgba(255, 255, 255, 0.4);
            font-weight: 600;
        }

        .hud-word {
            font-size: 0.65rem;
            color: rgba(255, 255, 255, 0.25);
            max-width: 80vw;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            font-family: 'JetBrains Mono', monospace;
        }

        .hud-info {
            font-size: 0.78rem;
            color: rgba(255, 255, 255, 0.5);
        }

        .hud-info em {
            color: #ffab40;
            font-style: normal;
        }

        /* Loading overlay */
        #loading {
            position: fixed;
            inset: 0;
            background: #0a0a0f;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            transition: opacity 0.8s ease;
        }

        #loading.fade-out {
            opacity: 0;
            pointer-events: none;
        }

        .loading-text {
            font-size: 1.1rem;
            color: rgba(255, 255, 255, 0.5);
            margin-bottom: 1rem;
        }

        .loading-bar {
            width: 200px;
            height: 3px;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 3px;
            overflow: hidden;
        }

        .loading-bar-fill {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #00e5ff, #b388ff);
            border-radius: 3px;
            transition: width 0.3s ease;
        }
    </style>

    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
        }
    }
    </script>
</head>

<body>
    <div id="canvas-container"></div>

    <div id="loading">
        <div class="loading-text">Building kernel braid…</div>
        <div class="loading-bar">
            <div class="loading-bar-fill" id="loading-fill"></div>
        </div>
    </div>

    <div class="hud">
        <div class="hud-title">Kernel Element w₂ — B₄ mod (t − 2)</div>
        <div class="hud-info"><em>89</em> generators · 4 strands · identity in Burau representation</div>
        <div class="hud-word" id="hud-word"></div>
    </div>

    <script type="module" src="kernelBraid.js"></script>
</body>

</html>
