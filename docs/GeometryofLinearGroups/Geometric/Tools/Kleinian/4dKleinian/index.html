<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>4D Kleinian Limit Sets</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Space+Grotesk:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="4dKleinian.css">
</head>

<body>
    <div id="container"></div>

    <div id="stats" aria-live="polite">FPS 0</div>

    <aside class="hud" id="hud">
        <div class="hud-header">
            <div>
                <p class="eyebrow">GPU Shader Visualizer</p>
                <h1>4D Kleinian Limit Sets</h1>
            </div>
            <button id="hideHud" class="icon-button" type="button" aria-label="Hide controls">Hide</button>
        </div>

        <p id="groupDescription" class="hud-description">
            Curated inversion-sphere groups rendered as a ray-marched limit set in the boundary of hyperbolic 4-space.
        </p>

        <div class="quick-grid">
            <label class="field">
                <span>Group</span>
                <select id="groupSelect"></select>
            </label>

            <label class="field">
                <span>Palette</span>
                <select id="colorPalette"></select>
            </label>

            <label class="field">
                <span>Coloring</span>
                <select id="colorScheme"></select>
            </label>

            <label class="field">
                <span>Quality</span>
                <select id="qualityPreset">
                    <option value="low">Low</option>
                    <option value="medium">Medium</option>
                    <option value="high" selected>High</option>
                    <option value="ultra">Ultra</option>
                    <option value="custom">Custom</option>
                </select>
            </label>
        </div>

        <div class="chip-row">
            <span id="groupFamily" class="chip">Classical Arrangements</span>
            <span id="sphereCount" class="chip">0 inversion spheres</span>
            <span class="chip">Drag to orbit</span>
            <span class="chip">H to hide</span>
        </div>

        <details class="advanced-panel" id="advancedPanel">
            <summary>Advanced</summary>

            <div class="advanced-grid">
                <label class="field">
                    <span>Iterations <em id="maxIterValue">36</em></span>
                    <input type="range" id="maxIterations" min="12" max="80" value="36" step="1">
                </label>

                <label class="field">
                    <span>March Steps <em id="maxMarchValue">420</em></span>
                    <input type="range" id="maxMarchSteps" min="180" max="900" value="420" step="20">
                </label>

                <label class="field">
                    <span>Distance Scale <em id="scalingValue">0.084</em></span>
                    <input type="range" id="scalingFactor" min="0.040" max="0.140" value="0.084" step="0.002">
                </label>

                <label class="field">
                    <span>Klein Radius <em id="kleinRValue">0.420</em></span>
                    <input type="range" id="kleinSphereRadius" min="0.200" max="0.900" value="0.420" step="0.01">
                </label>

                <label class="field">
                    <span>Seed Radius <em id="seedRadiusValue">0.170</em></span>
                    <input type="range" id="seedRadius" min="0.050" max="0.300" value="0.170" step="0.005">
                </label>

                <label class="field">
                    <span>Field of View <em id="fovValue">58°</em></span>
                    <input type="range" id="fov" min="35" max="90" value="58" step="1">
                </label>

                <label class="field" id="modulusControl" hidden>
                    <span>Modulo Bands <em id="modulusValue">6</em></span>
                    <input type="range" id="modulus" min="2" max="16" value="6" step="1">
                </label>
            </div>

            <div class="action-row">
                <button id="resetView" type="button">Reset View</button>
                <button id="groupDefaults" type="button">Group Defaults</button>
            </div>
        </details>
    </aside>

    <button id="showHud" class="show-hud" type="button" hidden>Controls</button>

    <p class="screen-hint">orbit: drag · zoom: wheel · pan: right-drag</p>

    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.171.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.171.0/examples/jsm/"
        }
    }
    </script>

    <script type="module" src="./main.js"></script>
</body>

</html>
