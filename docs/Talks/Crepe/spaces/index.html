<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spaces | Symmetry and Space</title>
    <meta name="description" content="Step through seven examples of metric spaces.">
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap">
    <style>
        :root {
            --bg: #060a14;
            --accent: #7c8aff;
            --text: #94a3b8;
            --muted: #64748b;
            --dim: rgba(124,138,255,0.25);
            --grid: rgba(124,138,255,0.07);
            --grid-bold: rgba(124,138,255,0.14);
        }

        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; background: var(--bg); }
        body { font-family: 'Inter', sans-serif; color: #f1f5f9; }

        #stage { width: 100%; height: 100%; position: relative; }

        /* Canvas fills the screen */
        canvas { position: absolute; inset: 0; width: 100%; height: 100%; display: none; }
        canvas.active { display: block; }

        /* Iframe slides */
        .iframe-slide {
            position: absolute; inset: 0; width: 100%; height: 100%;
            display: none; border: none;
        }
        .iframe-slide.active { display: block; }

        /* Image slide */
        #slide-escher {
            position: absolute; inset: 0; width: 100%; height: 100%;
            display: none; align-items: center; justify-content: center;
            background: var(--bg);
        }
        #slide-escher.active { display: flex; }
        #slide-escher img {
            max-width: 85%; max-height: 85%; border-radius: 16px;
            box-shadow: 0 0 80px rgba(124,138,255,0.15);
        }

        /* Navigation footer */
        #footer {
            position: absolute; bottom: 0; left: 0; right: 0; z-index: 20;
            display: flex; align-items: center; justify-content: center; gap: 16px;
            padding: 16px 24px;
            background: linear-gradient(transparent, rgba(6,10,20,0.9));
        }
        #footer button {
            width: 36px; height: 36px; border-radius: 8px; border: 1px solid rgba(124,138,255,0.2);
            background: rgba(6,10,20,0.7); backdrop-filter: blur(12px);
            color: #f1f5f9; font-size: 0.85rem; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.2s;
        }
        #footer button:hover { border-color: var(--accent); background: rgba(124,138,255,0.12); }
        #footer button:disabled { opacity: 0.3; pointer-events: none; }
        .dot-row { display: flex; gap: 6px; }
        .dot {
            width: 8px; height: 8px; border-radius: 50%;
            background: rgba(124,138,255,0.3); cursor: pointer;
            transition: all 0.2s;
        }
        .dot.active { background: var(--accent); transform: scale(1.3); }
        #description {
            position: absolute; bottom: 60px; left: 50%; transform: translateX(-50%);
            max-width: 660px; text-align: center; font-size: 0.9rem;
            color: var(--text); line-height: 1.5; z-index: 20;
            background: rgba(6,10,20,0.7); padding: 10px 20px; border-radius: 10px;
            backdrop-filter: blur(8px);
        }

        .embedded #footer, .embedded #description { display: none !important; }
    </style>
    <script>
        if (new URLSearchParams(window.location.search).get('embed') === 'true') {
            document.documentElement.classList.add('embedded');
        }
    </script>
</head>

<body>
    <div id="stage">
        <!-- Canvas slides -->
        <canvas id="canvas-line" class="active"></canvas>
        <canvas id="canvas-plane"></canvas>
        <canvas id="canvas-3space"></canvas>
        <canvas id="canvas-sphere"></canvas>

        <!-- Iframe slides -->
        <iframe id="slide-tree" class="iframe-slide" src="../treeIsoms/index.html?embed=true"></iframe>

        <!-- Image slide -->
        <div id="slide-escher">
            <img src="../assets/escherCircleLimit.jpg" alt="Escher Circle Limit IV — Hyperbolic Space">
        </div>

        <!-- Product of trees -->
        <iframe id="slide-product" class="iframe-slide" src="../productOfTrees/productOfTrees.html?embed=true"></iframe>
    </div>

    <div id="description"></div>

    <div id="footer">
        <button id="prev-btn" disabled>‹</button>
        <div class="dot-row" id="dots"></div>
        <button id="next-btn">›</button>
    </div>

    <script src="spaces.js"></script>
</body>

</html>
