<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ℝ²/ℤ² — The Torus</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
        html, body { width:100%; height:100%; overflow:hidden; background:#060a14; color:#f1f5f9;
            font-family:'Inter',-apple-system,sans-serif; -webkit-font-smoothing:antialiased; }
        #app { display:flex; flex-direction:column; height:100%; }
        #canvas-wrap { flex:1; position:relative; min-height:0; }
        canvas { position:absolute; inset:0; width:100%; height:100%; }
        canvas#canvas { z-index:6; pointer-events:none; }
        canvas#gl-canvas { z-index:5; display:none; }
        #footer { flex-shrink:0; padding:0 20px 20px; text-align:center; }
        #description { font-size:clamp(0.9rem,1.6vw,1.15rem); color:#cbd5e1; line-height:1.6;
            max-width:740px; margin:0 auto 16px; min-height:3.2em; }
        #nav { display:flex; align-items:center; justify-content:center; gap:16px; }
        .nav-btn { background:rgba(124,138,255,0.1); border:1px solid rgba(124,138,255,0.2);
            color:#f1f5f9; padding:8px 20px; border-radius:8px; font:500 0.85rem/1 'Inter',sans-serif;
            cursor:pointer; transition:all 0.25s; }
        .nav-btn:hover { background:rgba(124,138,255,0.2); border-color:rgba(124,138,255,0.4); }
        .nav-btn:disabled { opacity:0.3; cursor:default; }
        #dots { display:flex; gap:6px; }
        .dot { width:8px; height:8px; border-radius:50%; background:rgba(124,138,255,0.2); transition:all 0.3s; cursor:pointer; }
        .dot.active { background:#7c8aff; box-shadow:0 0 8px rgba(124,138,255,0.5); }
        .embedded #footer { display: none !important; }
        .embedded #canvas-wrap { height: 100vh !important; }
    </style>
    <script>
        if (new URLSearchParams(window.location.search).get('embed') === 'true') {
            document.documentElement.classList.add('embedded');
        }
    </script>
</head>
<body>
<div id="app">
    <div id="canvas-wrap">
        <canvas id="canvas"></canvas>
        <canvas id="gl-canvas"></canvas>
    </div>
    <div id="footer">
        <div id="description"></div>
        <div id="nav">
            <button class="nav-btn" id="prev-btn" onclick="prev()">&#8592; Prev</button>
            <div id="dots"></div>
            <button class="nav-btn" id="next-btn" onclick="next()">Next &#8594;</button>
        </div>
    </div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="main.js"></script>
</body>
</html>
