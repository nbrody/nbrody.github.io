<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ℝ/ℤ ≅ S¹ — The Circle</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
        html, body { width:100%; height:100%; overflow:hidden; background:#060a14; color:#f1f5f9;
            font-family:'Inter',-apple-system,sans-serif; -webkit-font-smoothing:antialiased; }
        #app { display:flex; flex-direction:column; height:100%; }
        #canvas-wrap { flex:1; position:relative; min-height:0; }
        canvas { position:absolute; inset:0; width:100%; height:100%; }
        #footer { flex-shrink:0; padding:0 20px 20px; text-align:center; }
        #description { font-size:clamp(0.9rem,1.6vw,1.15rem); color:#cbd5e1; line-height:1.6;
            max-width:740px; margin:0 auto 16px; min-height:3.2em; }
        #nav { display:flex; align-items:center; justify-content:center; gap:16px; }
        .nav-btn { background:rgba(124,138,255,0.1); border:1px solid rgba(124,138,255,0.2);
            color:#f1f5f9; padding:8px 20px; border-radius:8px; font:500 0.85rem/1 'Inter',sans-serif;
            cursor:pointer; transition:all 0.25s; }
        .nav-btn:hover { background:rgba(124,138,255,0.2); border-color:rgba(124,138,255,0.4); }
        .nav-btn:disabled { opacity:0.3; cursor:default; }
        #dots { display:flex; gap:6px; }
        .dot { width:8px; height:8px; border-radius:50%; background:rgba(124,138,255,0.2); transition:all 0.3s; cursor:pointer; }
        .dot.active { background:#7c8aff; box-shadow:0 0 8px rgba(124,138,255,0.5); }

        /* Slider overlay */
        #slider-panel {
            position:absolute; bottom:16px; left:50%; transform:translateX(-50%);
            display:none; align-items:center; gap:10px; z-index:10;
            background:rgba(6,10,20,0.75); backdrop-filter:blur(12px);
            padding:10px 18px; border-radius:12px; border:1px solid rgba(124,138,255,0.15);
            color:#cbd5e1; font:500 0.8rem/1 'Inter',sans-serif;
        }
        #slider-panel label { color:#94a3b8; }
        #offset-slider {
            -webkit-appearance:none; appearance:none; width:200px; height:4px;
            background:rgba(124,138,255,0.2); border-radius:2px; outline:none;
        }
        #offset-slider::-webkit-slider-thumb {
            -webkit-appearance:none; width:14px; height:14px; border-radius:50%;
            background:#7c8aff; cursor:pointer; box-shadow:0 0 8px rgba(124,138,255,0.5);
        }
        #offset-value { color:#7c8aff; min-width:40px; text-align:right; font-variant-numeric:tabular-nums; }
    </style>
</head>
<body>
<div id="app">
    <div id="canvas-wrap">
        <canvas id="canvas"></canvas>
        <div id="slider-panel">
            <label>offset</label>
            <input type="range" id="offset-slider" min="0" max="1" step="0.005" value="0.37">
            <span id="offset-value">0.37</span>
        </div>
    </div>
    <div id="footer">
        <div id="description"></div>
        <div id="nav">
            <button class="nav-btn" id="prev-btn" onclick="prev()">← Prev</button>
            <div id="dots"></div>
            <button class="nav-btn" id="next-btn" onclick="next()">Next →</button>
        </div>
    </div>
</div>
<script>
MathJax = {
    tex: { inlineMath: [['\\(','\\)']] },
    svg: { fontCache: 'global' },
    startup: { typeset: true }
};
</script>
<script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>
<script type="module" src="main.js"></script>
</body>
</html>
