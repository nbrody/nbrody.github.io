<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Map of Mathematics</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <svg id="map" preserveAspectRatio="xMidYMid meet">
    <defs>
      <pattern id="oceanDots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
        <circle cx="20" cy="20" r="0.8" fill="rgba(255,255,255,0.06)" />
      </pattern>
      <filter id="continentShadow" x="-20%" y="-20%" width="140%" height="140%">
        <feGaussianBlur in="SourceAlpha" stdDeviation="6" />
        <feOffset dx="0" dy="4" result="offsetBlur" />
        <feFlood flood-color="#000" flood-opacity="0.35" />
        <feComposite in2="offsetBlur" operator="in" />
        <feMerge>
          <feMergeNode />
          <feMergeNode in="SourceGraphic" />
        </feMerge>
      </filter>
    </defs>
    <rect id="ocean" width="100%" height="100%" />
    <rect id="oceanPattern" width="100%" height="100%" fill="url(#oceanDots)" />
    <g id="world"></g>
  </svg>

  <header id="title">
    <div class="title-main">Map of Mathematics</div>
    <div class="title-sub">click a region to explore — scroll to zoom — drag to pan</div>
    <a class="title-link" href="../scienceMap/index.html">↗ Map of Science</a>
  </header>

  <aside id="info" aria-hidden="true">
    <h3 id="info-title"></h3>
    <p id="info-desc"></p>
    <ul id="info-topics"></ul>
  </aside>

  <div id="controls">
    <button class="ctrl-btn" id="zoomIn" title="Zoom in">+</button>
    <button class="ctrl-btn" id="zoomOut" title="Zoom out">−</button>
    <button class="ctrl-btn" id="reset" title="Reset view">⌂</button>
  </div>

  <script src="js/data.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
