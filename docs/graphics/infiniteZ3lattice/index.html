<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Z³ Lattice Sine Waves — Raymarched</title>
<style>
  html, body { margin: 0; height: 100%; background: #05070d; color: #cfd6e4;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    overflow: hidden; }
  #info {
    position: absolute; top: 12px; left: 12px; z-index: 10;
    background: rgba(20, 24, 36, 0.55);
    backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 10px; padding: 10px 14px; font-size: 13px; line-height: 1.45;
    user-select: none;
  }
  #info b { color: #ffffff; }
  #controls { margin-top: 8px; display: grid; gap: 4px; font-size: 12px; }
  #controls label { display: flex; align-items: center; gap: 8px; }
  #controls input[type=range] { width: 140px; }
  canvas { display: block; }
</style>
</head>
<body>
<div id="info">
  <b>Z³ lattice sine waves — raymarched (infinite)</b><br>
  Phase = (iₓ cos θ + i_z sin θ)·k, θ rotates with time.
  <div id="controls">
    <label>amplitude <input id="aSlider" type="range" min="0" max="0.45" step="0.01" value="0.28"></label>
    <label>wavenumber <input id="kSlider" type="range" min="0" max="2" step="0.01" value="0.7"></label>
    <label>ω rotate <input id="wSlider" type="range" min="0" max="1" step="0.01" value="0.25"></label>
    <label>radius <input id="rSlider" type="range" min="0.08" max="0.4" step="0.01" value="0.22"></label>
    <label>time speed <input id="tSlider" type="range" min="0" max="3" step="0.01" value="1.4"></label>
  </div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}
</script>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

const renderer = new THREE.WebGLRenderer({ antialias: false });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.5));
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);
renderer.autoClear = false;

// Camera for interaction (OrbitControls). Spherical raymarch uses its world matrix.
const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 500);
camera.position.set(4, 3, 6);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.target.set(0, 0, 0);

// Main scene is just a full-screen quad that runs the raymarcher.
const rayScene = new THREE.Scene();
const rayCam = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);

const uniforms = {
  uTime:        { value: 0 },
  uResolution:  { value: new THREE.Vector2(window.innerWidth, window.innerHeight) },
  uCameraPos:   { value: new THREE.Vector3() },
  uCameraMat:   { value: new THREE.Matrix4() },
  uTanHalfFov:  { value: Math.tan(THREE.MathUtils.degToRad(camera.fov) * 0.5) },
  uAspect:      { value: window.innerWidth / window.innerHeight },
  uAmplitude:   { value: 0.28 },
  uWavenumber:  { value: 0.7 },
  uOmega:       { value: 0.25 },
  uRadius:      { value: 0.22 },
  uTimeFreq:    { value: 1.4 },
};

const rayMat = new THREE.ShaderMaterial({
  uniforms,
  depthTest: false,
  depthWrite: false,
  vertexShader: /* glsl */`
    void main() { gl_Position = vec4(position.xy, 0.0, 1.0); }
  `,
  fragmentShader: /* glsl */`
    precision highp float;

    uniform float uTime;
    uniform vec2  uResolution;
    uniform vec3  uCameraPos;
    uniform mat4  uCameraMat;   // camera-local -> world
    uniform float uTanHalfFov;
    uniform float uAspect;

    uniform float uAmplitude;
    uniform float uWavenumber;
    uniform float uOmega;
    uniform float uRadius;
    uniform float uTimeFreq;

    // Lattice spacing is 1 in shader units — Z^3 integer lattice.
    const float S = 1.0;

    // Signed-distance to nearest sphere. Spheres sit at integer (x, y, z),
    // shifted in y by A*sin(ω_t t + (ix*cosθ + iz*sinθ)*k).
    // We scan the 3×3 block of (ix, iz) columns around p and for each pick
    // the nearest integer iy. A 0.85 safety factor keeps marching conservative
    // since the returned value isn't a strict global SDF.
    float mapSDF(vec3 p, vec2 dir) {
      float minD = 1e9;
      float fx = floor(p.x / S + 0.5);
      float fz = floor(p.z / S + 0.5);
      for (int dx = -1; dx <= 1; dx++) {
        for (int dz = -1; dz <= 1; dz++) {
          float ix = fx + float(dx);
          float iz = fz + float(dz);
          float phase = (ix * dir.x + iz * dir.y) * uWavenumber;
          float offset = uAmplitude * sin(uTime * uTimeFreq + phase);
          float iy = floor((p.y - offset) / S + 0.5);
          vec3 c = vec3(ix * S, iy * S + offset, iz * S);
          float d = length(p - c) - uRadius;
          minD = min(minD, d);
        }
      }
      return minD * 0.85;
    }

    vec3 normalAt(vec3 p, vec2 dir) {
      const float h = 0.0015;
      vec2 e = vec2(h, 0.0);
      return normalize(vec3(
        mapSDF(p + e.xyy, dir) - mapSDF(p - e.xyy, dir),
        mapSDF(p + e.yxy, dir) - mapSDF(p - e.yxy, dir),
        mapSDF(p + e.yyx, dir) - mapSDF(p - e.yyx, dir)
      ));
    }

    // Soft shadow from light direction
    float softShadow(vec3 ro, vec3 rd, vec2 dir) {
      float res = 1.0;
      float t = 0.03;
      for (int i = 0; i < 24; i++) {
        float d = mapSDF(ro + rd * t, dir);
        res = min(res, 12.0 * d / t);
        t += clamp(d, 0.02, 0.4);
        if (res < 0.01 || t > 8.0) break;
      }
      return clamp(res, 0.0, 1.0);
    }

    void main() {
      vec2 frag = (gl_FragCoord.xy / uResolution) * 2.0 - 1.0;
      vec3 rdLocal = normalize(vec3(frag.x * uAspect * uTanHalfFov,
                                    frag.y * uTanHalfFov,
                                   -1.0));
      vec3 rd = normalize((uCameraMat * vec4(rdLocal, 0.0)).xyz);
      vec3 ro = uCameraPos;

      float angle = uTime * uOmega;
      vec2 dir = vec2(cos(angle), sin(angle));

      // Raymarch
      float t = 0.0;
      float tMax = 60.0;
      bool  hit = false;
      const int STEPS = 160;
      for (int i = 0; i < STEPS; i++) {
        vec3 p = ro + rd * t;
        float d = mapSDF(p, dir);
        if (d < 0.0008) { hit = true; break; }
        if (t > tMax) break;
        t += d;
      }

      // Sky / fog base color
      float skyT = clamp(0.5 + 0.5 * rd.y, 0.0, 1.0);
      vec3 sky = mix(vec3(0.02, 0.03, 0.06), vec3(0.09, 0.12, 0.22), skyT);
      vec3 col = sky;

      if (hit) {
        vec3 p = ro + rd * t;
        vec3 n = normalAt(p, dir);

        // Phase-based color tint (cool trough -> warm crest), computed from
        // the column (ix, iz) that owns this hit point.
        float ix = floor(p.x / S + 0.5);
        float iz = floor(p.z / S + 0.5);
        float phase = (ix * dir.x + iz * dir.y) * uWavenumber;
        float sv = sin(uTime * uTimeFreq + phase);
        float u = 0.5 + 0.5 * sv;
        vec3 cold = vec3(0.18, 0.30, 0.65);
        vec3 warm = vec3(0.98, 0.78, 0.38);
        vec3 albedo = mix(cold, warm, u);

        vec3 lightDir = normalize(vec3(0.45, 0.85, 0.30));
        float diff = max(dot(n, lightDir), 0.0);
        float sh = softShadow(p + n * 0.01, lightDir, dir);
        float amb = 0.25 + 0.15 * (0.5 + 0.5 * n.y);
        float fres = pow(1.0 - max(dot(n, -rd), 0.0), 3.0);

        col = albedo * (amb + diff * sh * 0.85)
            + vec3(0.55, 0.70, 0.95) * fres * 0.25;

        // Distance fog
        float fogT = 1.0 - exp(-0.025 * t);
        col = mix(col, sky, fogT);
      }

      // Subtle synchronization line on the y = 0 plane:
      // intersect the ray with y = 0 and check distance to the line
      // perpendicular to d through the origin.
      if (abs(rd.y) > 1e-4) {
        float tp = -ro.y / rd.y;
        if (tp > 0.0 && (!hit || tp < t - 0.05)) {
          vec3 hp = ro + rd * tp;
          // distance in (x,z) to line through origin with direction perpendicular to dir
          // line direction = (-dir.y, dir.x); signed distance from origin = dot(hp.xz, dir).
          float dLine = abs(hp.x * dir.x + hp.z * dir.y);
          float w = 0.035;
          float line = smoothstep(w, 0.0, dLine);
          // attenuate with distance for depth
          float fade = exp(-0.015 * tp);
          col = mix(col, vec3(1.0, 0.82, 0.35), line * fade * 0.85);

          // faint arrow along +d (wave-propagation direction)
          float dAxis = abs(-hp.x * dir.y + hp.z * dir.x);   // perp to dir through origin
          float axis = smoothstep(0.02, 0.0, dAxis);
          float fwd  = step(0.0, hp.x * dir.x + hp.z * dir.y);
          col = mix(col, vec3(0.42, 0.82, 1.0), axis * fade * 0.5 * fwd);
        }
      }

      gl_FragColor = vec4(col, 1.0);
    }
  `,
});

const quad = new THREE.Mesh(new THREE.PlaneGeometry(2, 2), rayMat);
rayScene.add(quad);

// Inputs
const aSlider = document.getElementById('aSlider');
const kSlider = document.getElementById('kSlider');
const wSlider = document.getElementById('wSlider');
const rSlider = document.getElementById('rSlider');
const tSlider = document.getElementById('tSlider');
aSlider.addEventListener('input', () => uniforms.uAmplitude.value = parseFloat(aSlider.value));
kSlider.addEventListener('input', () => uniforms.uWavenumber.value = parseFloat(kSlider.value));
wSlider.addEventListener('input', () => uniforms.uOmega.value     = parseFloat(wSlider.value));
rSlider.addEventListener('input', () => uniforms.uRadius.value    = parseFloat(rSlider.value));
tSlider.addEventListener('input', () => uniforms.uTimeFreq.value  = parseFloat(tSlider.value));

const clock = new THREE.Clock();

function onResize() {
  renderer.setSize(window.innerWidth, window.innerHeight);
  uniforms.uResolution.value.set(window.innerWidth, window.innerHeight);
  uniforms.uAspect.value = window.innerWidth / window.innerHeight;
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
}
window.addEventListener('resize', onResize);

function animate() {
  const dt = clock.getDelta();
  uniforms.uTime.value += dt;
  controls.update();
  camera.updateMatrixWorld();
  uniforms.uCameraPos.value.copy(camera.position);
  uniforms.uCameraMat.value.copy(camera.matrixWorld);
  uniforms.uTanHalfFov.value = Math.tan(THREE.MathUtils.degToRad(camera.fov) * 0.5);

  renderer.clear();
  renderer.render(rayScene, rayCam);
  requestAnimationFrame(animate);
}
animate();
</script>
</body>
</html>
