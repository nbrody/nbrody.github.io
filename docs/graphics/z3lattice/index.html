<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Z³ Lattice Sine Waves</title>
<style>
  html, body { margin: 0; height: 100%; background: #05070d; color: #cfd6e4;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    overflow: hidden; }
  #info {
    position: absolute; top: 12px; left: 12px; z-index: 10;
    background: rgba(20, 24, 36, 0.55);
    backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 10px; padding: 10px 14px; font-size: 13px; line-height: 1.45;
    user-select: none;
  }
  #info b { color: #ffffff; }
  #controls { margin-top: 8px; display: grid; gap: 4px; font-size: 12px; }
  #controls label { display: flex; align-items: center; gap: 8px; }
  #controls input[type=range] { width: 140px; }
  canvas { display: block; }
</style>
</head>
<body>
<div id="info">
  <b>Z³ lattice sine waves</b><br>
  Phase staggered by (x, z)·d, where d rotates in the plane.
  <div id="controls">
    <label>grid N <input id="nSlider" type="range" min="3" max="12" step="1" value="7"></label>
    <label>amplitude <input id="aSlider" type="range" min="0" max="1.2" step="0.01" value="0.45"></label>
    <label>wavenumber <input id="kSlider" type="range" min="0" max="2" step="0.01" value="0.7"></label>
    <label>ω rotate <input id="wSlider" type="range" min="0" max="1" step="0.01" value="0.25"></label>
    <label>radius <input id="rSlider" type="range" min="0.05" max="0.8" step="0.01" value="0.22"></label>
  </div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}
</script>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
(() => {
  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0x05070d);
  scene.fog = new THREE.Fog(0x05070d, 20, 70);

  const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 500);
  camera.position.set(18, 14, 22);

  const renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setSize(window.innerWidth, window.innerHeight);
  document.body.appendChild(renderer.domElement);

  const controls = new OrbitControls(camera, renderer.domElement);
  controls.enableDamping = true;
  controls.dampingFactor = 0.08;
  controls.target.set(0, 0, 0);

  // Lights
  scene.add(new THREE.AmbientLight(0x405070, 0.55));
  const key = new THREE.DirectionalLight(0xffffff, 0.9);
  key.position.set(10, 20, 8);
  scene.add(key);
  const rim = new THREE.DirectionalLight(0x7aa7ff, 0.5);
  rim.position.set(-12, 6, -10);
  scene.add(rim);

  // Lattice state
  let N = 7;                      // half-extent of lattice: -N..N on each axis
  let spacing = 1.6;              // lattice spacing in world units
  let amplitude = 0.45;           // vertical oscillation amplitude
  let wavenumber = 0.7;           // spatial frequency along direction d
  let omega = 0.25;               // rotation rate of d (rad/s)
  let timeFreq = 1.4;             // temporal frequency of sine wave (rad/s)
  let radius = 0.22;              // sphere radius

  const sphereGeom = new THREE.SphereGeometry(1, 24, 18);
  const sphereMat = new THREE.MeshStandardMaterial({
    color: 0xffffff, roughness: 0.35, metalness: 0.1,
    emissive: 0x223066, emissiveIntensity: 0.35,
  });

  let mesh = null;         // InstancedMesh
  let instanceData = null; // array of {x, y0, z} for each instance
  const dummy = new THREE.Object3D();
  const tmpColor = new THREE.Color();

  function rebuild() {
    if (mesh) {
      scene.remove(mesh);
      mesh.geometry.dispose();
      mesh.dispose?.();
    }
    const side = 2 * N + 1;
    const count = side * side * side;
    mesh = new THREE.InstancedMesh(sphereGeom, sphereMat, count);
    mesh.instanceMatrix.setUsage(THREE.DynamicDrawUsage);
    const colors = new Float32Array(count * 3);
    mesh.instanceColor = new THREE.InstancedBufferAttribute(colors, 3);
    instanceData = new Array(count);

    let i = 0;
    for (let ix = -N; ix <= N; ix++) {
      for (let iy = -N; iy <= N; iy++) {
        for (let iz = -N; iz <= N; iz++) {
          const x = ix * spacing;
          const y0 = iy * spacing;
          const z = iz * spacing;
          instanceData[i] = { ix, iy, iz, x, y0, z };
          dummy.position.set(x, y0, z);
          dummy.scale.setScalar(radius);
          dummy.updateMatrix();
          mesh.setMatrixAt(i, dummy.matrix);
          i++;
        }
      }
    }
    mesh.instanceMatrix.needsUpdate = true;
    scene.add(mesh);
  }
  rebuild();

  // Synchronization line on the Z² plane (y = -N*spacing - 0.3)
  const planeY = () => -(N + 0.3) * spacing;
  const lineLen = () => (N + 1) * spacing * 2.4;

  const lineMat = new THREE.LineBasicMaterial({ color: 0xffd36a, transparent: true, opacity: 0.9 });
  const lineGeom = new THREE.BufferGeometry();
  lineGeom.setAttribute('position', new THREE.BufferAttribute(new Float32Array(6), 3));
  const syncLine = new THREE.Line(lineGeom, lineMat);
  scene.add(syncLine);

  // A translucent ground disk as visual reference for the Z² plane
  const diskGeom = new THREE.CircleGeometry(1, 64);
  const diskMat = new THREE.MeshBasicMaterial({ color: 0x1a2438, transparent: true, opacity: 0.45, side: THREE.DoubleSide });
  const disk = new THREE.Mesh(diskGeom, diskMat);
  disk.rotation.x = -Math.PI / 2;
  scene.add(disk);

  // Direction arrow (perpendicular to sync line = wave propagation dir d)
  const arrowMat = new THREE.LineBasicMaterial({ color: 0x6ad0ff, transparent: true, opacity: 0.85 });
  const arrowGeom = new THREE.BufferGeometry();
  arrowGeom.setAttribute('position', new THREE.BufferAttribute(new Float32Array(6), 3));
  const arrow = new THREE.Line(arrowGeom, arrowMat);
  scene.add(arrow);

  // Inputs
  const nSlider = document.getElementById('nSlider');
  const aSlider = document.getElementById('aSlider');
  const kSlider = document.getElementById('kSlider');
  const wSlider = document.getElementById('wSlider');
  const rSlider = document.getElementById('rSlider');
  nSlider.addEventListener('input', () => { N = parseInt(nSlider.value, 10); rebuild(); });
  aSlider.addEventListener('input', () => { amplitude = parseFloat(aSlider.value); });
  kSlider.addEventListener('input', () => { wavenumber = parseFloat(kSlider.value); });
  wSlider.addEventListener('input', () => { omega = parseFloat(wSlider.value); });
  rSlider.addEventListener('input', () => { radius = parseFloat(rSlider.value); });

  // Animation
  const clock = new THREE.Clock();
  let angle = 0;

  function update(dt, t) {
    angle += omega * dt;
    const dx = Math.cos(angle);
    const dz = Math.sin(angle);
    const count = instanceData.length;
    for (let i = 0; i < count; i++) {
      const d = instanceData[i];
      const phase = (d.ix * dx + d.iz * dz) * wavenumber;
      const s = Math.sin(t * timeFreq + phase);
      dummy.position.set(d.x, d.y0 + amplitude * s, d.z);
      dummy.scale.setScalar(radius);
      dummy.updateMatrix();
      mesh.setMatrixAt(i, dummy.matrix);
      // color modulated by the sine value: cool trough -> warm crest
      const u = 0.5 + 0.5 * s;
      tmpColor.setHSL(0.62 - 0.42 * u, 0.7, 0.45 + 0.15 * u);
      mesh.setColorAt(i, tmpColor);
    }
    mesh.instanceMatrix.needsUpdate = true;
    if (mesh.instanceColor) mesh.instanceColor.needsUpdate = true;

    // Sync line: perpendicular to d, lying in the plane y = planeY
    const L = lineLen();
    const nx = -dz, nz = dx; // perpendicular to (dx, dz)
    const y = planeY();
    const p = syncLine.geometry.attributes.position.array;
    p[0] = -nx * L; p[1] = y; p[2] = -nz * L;
    p[3] =  nx * L; p[4] = y; p[5] =  nz * L;
    syncLine.geometry.attributes.position.needsUpdate = true;

    // Direction arrow from origin along d
    const aL = (N + 0.5) * spacing;
    const pa = arrow.geometry.attributes.position.array;
    pa[0] = 0; pa[1] = y; pa[2] = 0;
    pa[3] = dx * aL; pa[4] = y; pa[5] = dz * aL;
    arrow.geometry.attributes.position.needsUpdate = true;

    // Disk scaled to cover lattice
    const r = (N + 1) * spacing * 1.3;
    disk.scale.set(r, r, 1);
    disk.position.y = y - 0.01;
  }

  function animate() {
    const dt = clock.getDelta();
    const t = clock.elapsedTime;
    update(dt, t);
    controls.update();
    renderer.render(scene, camera);
    requestAnimationFrame(animate);
  }
  animate();

  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });
})();
</script>
</body>
</html>
