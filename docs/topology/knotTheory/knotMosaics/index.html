<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Knot Mosaic Playground</title>
    <meta name="description"
        content="Interactive knot mosaic builder — place tiles on disk, sphere, or torus surfaces to create knot diagrams.">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>
    <canvas id="canvas"></canvas>

    <!-- Header HUD -->
    <div id="header-hud">
        <span id="hud-label">Knot Mosaic</span>
        <span id="hud-info">Disk</span>
    </div>

    <!-- Toggle Panel Button -->
    <button id="toggle-panel-btn" title="Toggle Controls">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
            <path d="M3 6h14M3 10h14M3 14h14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" />
        </svg>
    </button>

    <!-- Control Panel -->
    <div id="ui-panel" class="glass-panel">
        <div class="panel-header">
            <div>
                <h1>Knot Mosaics</h1>
            </div>
            <button id="close-panel-btn" class="icon-btn" title="Close Panel">&times;</button>
        </div>

        <!-- Surface Selector -->
        <div class="control-group" style="padding: 0 20px; margin-bottom: 4px;">
            <div class="surface-select-wrapper">
                <select id="surface-select">
                    <option value="disk" data-icon="⊙">Disk</option>
                    <option value="sphere" data-icon="🌐">Sphere</option>
                    <option value="torus" data-icon="🍩">Torus</option>
                    <option value="projective" data-icon="⊕">Projective Plane</option>
                    <option value="cylinder" data-icon="◎">Cylinder</option>
                    <option value="mobius" data-icon="∞">Möbius Band</option>
                </select>
            </div>
        </div>

        <!-- Scrollable content area -->
        <div class="panel-scroll-area">
            <div class="control-group">
                <label>Grid Size <span id="grid-size-val" class="accent">5</span></label>
                <input type="range" id="grid-size-slider" min="1" max="10" value="5">
            </div>


            <div class="control-group">
                <label>Examples</label>
                <select id="example-select">
                    <option value="">— Choose a preset —</option>
                </select>
            </div>

            <div class="control-group checkbox-group">
                <input type="checkbox" id="show-connections-checkbox" checked>
                <label for="show-connections-checkbox">Highlight Mismatches</label>
            </div>

            <div class="control-group">
                <label>Strand Color</label>
                <div class="color-row">
                    <button class="color-swatch active" data-color="#6c8aff" style="background: #6c8aff;"></button>
                    <button class="color-swatch" data-color="#f472b6" style="background: #f472b6;"></button>
                    <button class="color-swatch" data-color="#22d3ee" style="background: #22d3ee;"></button>
                    <button class="color-swatch" data-color="#a78bfa" style="background: #a78bfa;"></button>
                    <button class="color-swatch" data-color="#34d399" style="background: #34d399;"></button>
                    <button class="color-swatch" data-color="#fbbf24" style="background: #fbbf24;"></button>
                    <button class="color-swatch" data-color="#fb923c" style="background: #fb923c;"></button>
                    <button class="color-swatch" data-color="#e8ecf4" style="background: #e8ecf4;"></button>
                    <button class="color-swatch" data-color="#111111"
                        style="background: #111111; border: 1px solid rgba(255,255,255,0.15);"></button>
                </div>
            </div>

            <div class="control-group">
                <label>Background</label>
                <div class="bg-toggle-row">
                    <button class="bg-toggle active" data-bg="black" title="Dark background">
                        <span class="bg-preview bg-preview-black"></span>
                        Black
                    </button>
                    <button class="bg-toggle" data-bg="white" title="Light background">
                        <span class="bg-preview bg-preview-white"></span>
                        White
                    </button>
                </div>
            </div>
        </div>

        <!-- Action Buttons -->
        <div class="button-group">
            <button id="clear-btn" class="btn btn-outline">Clear</button>
            <button id="export-btn" class="btn btn-primary">
                <span class="btn-icon">⬇</span> Export
            </button>
        </div>
        <div class="button-group" id="fold-group" style="display: none;">
            <button id="fold-btn" class="btn btn-primary" style="flex:1">
                <span class="btn-icon">🔮</span> Fold
            </button>
        </div>
    </div>

    <!-- Tile Palette -->
    <div id="tile-palette">
        <div class="palette-header"
            style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;">
            <div class="palette-label">Tiles</div>
            <label class="cube-toggle">
                <input type="checkbox" id="show-orientations-toggle">
                <span>All orientations</span>
            </label>
        </div>
        <div id="palette-tiles" class="palette-tiles-row"></div>
        <div class="palette-hint">Click or drag to place · Right-click to erase</div>
    </div>

    <!-- 3D Cube Overlay -->
    <div id="cube-overlay">
        <canvas id="cube-canvas"></canvas>
        <div id="cube-toolbar">
            <div class="cube-toolbar-inner">
                <label class="cube-toggle">
                    <input type="checkbox" id="cube-hide-grid">
                    <span>Hide Grid</span>
                </label>
                <div class="render-mode-toggle">
                    <button class="render-mode-btn" data-mode="tiles">Tiles</button>
                    <button class="render-mode-btn active" data-mode="tubes">Tubes</button>
                </div>
                <button id="cube-unfold-btn" class="btn btn-secondary">Unfold</button>
                <button id="cube-close-btn" class="btn btn-outline">Close</button>
            </div>
        </div>
    </div>

    <script src="tiles.js"></script>
    <script src="exampleLibrary.js"></script>
    <script src="app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="cube3d.js"></script>
    <script src="torus3d.js"></script>
</body>

</html>
